{% extends "base.html" %}

{% block content %}

<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:16px;
width:350px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
text-align:center;
}

input, select{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
font-weight:600;
cursor:pointer;
}

</style>

<div class="card">

<h2>Edit Task</h2>

<form method="POST">

<input type="text" name="task" value="{{ task[0] }}" required>

<select name="priority">
<option value="Low" {% if task[1]=="Low" %}selected{% endif %}>Low</option>
<option value="Medium" {% if task[1]=="Medium" %}selected{% endif %}>Medium</option>
<option value="High" {% if task[1]=="High" %}selected{% endif %}>High</option>
</select>

<button type="submit">Update</button>

</form>

<br>

<a href="/">← Back</a>

</div>

{% endblock %}
